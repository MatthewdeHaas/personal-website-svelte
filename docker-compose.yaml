services:
  app:
    build: .
    ports: ["3000:3000"]
    volumes: ["./src:/app/src"]  # dev hot reload
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/personal-website
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: personal-website
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  pgdata:
