services:
  app:
    image: ghcr.io/matthewdehaas/personal-website-svelte:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OBJECT_STORAGE_URL=${OBJECT_STORAGE_URL}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
